<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work With Me - Meaghan White</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c2e30; /* Sleek dark background */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #pdf-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 40px 0;
        }
        .page-canvas {
            max-width: 100%;
            height: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-color: white;
        }
        /* Floating Download Button */
        .download-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #ffffff;
            color: #111111;
            padding: 14px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-family: 'Inter', -apple-system, sans-serif;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            background-color: #f0f0f0;
        }
        .download-btn svg {
            width: 18px;
            height: 18px;
        }
        
        /* Mobile responsiveness */
        @media (max-width: 768px) {
            #pdf-container {
                gap: 10px;
                padding: 10px 0;
            }
            .download-btn {
                bottom: 20px;
                right: 20px;
                padding: 12px 20px;
            }
        }
    </style>
    <!-- Load PDF.js from Mozilla CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

    <!-- Download Button with SVG Icon -->
    <a href="workwithme.pdf" class="download-btn" download>
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
        </svg>
        Download PDF
    </a>

    <div id="pdf-container"></div>

    <script>
        // Set the worker source for PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // The name of the PDF file to load (must be in the same directory)
        const pdfUrl = 'workwithme.pdf';
        const container = document.getElementById('pdf-container');

        // Scale controls the resolution of the rendered images.
        // Higher scale = sharper text, but higher memory usage.
        let scale = 1.5; 
        if (window.innerWidth <= 768) {
            scale = window.innerWidth / 500; // Heuristic for crisp mobile rendering
        } else if (window.innerWidth >= 1920) {
            scale = 2.0; // 4k displays
        }

        // Fetch and load the PDF
        pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
            const numPages = pdf.numPages;
            
            // Loop through each page and render it
            for (let pageNum = 1; pageNum <= numPages; pageNum++) {
                pdf.getPage(pageNum).then(page => {
                    const viewport = page.getViewport({ scale: scale });
                    
                    // Create a canvas for this page
                    const canvas = document.createElement('canvas');
                    canvas.className = 'page-canvas';
                    const context = canvas.getContext('2d');
                    
                    // Set canvas dimensions to match the scaled PDF page
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    
                    container.appendChild(canvas);
                    
                    // Render the PDF page into the canvas context
                    const renderContext = {
                        canvasContext: context,
                        viewport: viewport
                    };
                    page.render(renderContext);
                });
            }
        }).catch(err => {
            console.error('Error loading PDF:', err);
            container.innerHTML = '<p style="color:white; font-family:sans-serif; margin-top:50px;">Error loading portfolio. Please use the download button.</p>';
        });
    </script>
</body>
</html>
